services:
  twenty:
    image: twentycrm/twenty:v1.20.0
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - PG_DATABASE_URL=postgres://twenty:twenty@twenty-db:5432/default
      - SERVER_URL=http://localhost:3001
      - FRONT_BASE_URL=http://localhost:3001
      - ENABLE_DB_MIGRATIONS=true
      - SIGN_IN_PREFILLED=true  # Set to false in production
      - STORAGE_TYPE=local
      - REDIS_URL=redis://twenty-redis:6379
      - APP_SECRET=${APP_SECRET}
    depends_on:
      twenty-db:
        condition: service_healthy
      twenty-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  twenty-redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  twenty-db:
    image: postgres:16-alpine
    volumes:
      - twenty-db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=twenty
      - POSTGRES_PASSWORD=twenty
      - POSTGRES_DB=default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twenty -d default"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  twenty-db-data:
